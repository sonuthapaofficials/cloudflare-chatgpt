<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Private DeepSeek</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; }
        #chat-box { height: 400px; border: 1px solid #ccc; overflow-y: auto; padding: 10px; margin-bottom: 10px; background: #f9f9f9; }
        .message { margin-bottom: 10px; padding: 8px; border-radius: 5px; }
        .user { background: #d1e7dd; text-align: right; }
        .bot { background: #e2e3e5; text-align: left; }
        input[type="text"], input[type="password"] { width: 70%; padding: 10px; }
        button { padding: 10px; width: 25%; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Private AI Chat</h2>
    
    <div id="login-section">
        <p>Enter your secret access key to continue:</p>
        <input type="password" id="passkey" placeholder="Enter Access Key">
        <button onclick="unlockChat()">Unlock</button>
    </div>

    <div id="chat-section" style="display: none;">
        <div id="chat-box"></div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="user-input" placeholder="Ask DeepSeek something..." onkeypress="handleEnter(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        let sessionMessages = [];
        let myPasskey = "";

        function unlockChat() {
            const key = document.getElementById("passkey").value;
            if(key) {
                myPasskey = key;
                document.getElementById("login-section").style.display = "none";
                document.getElementById("chat-section").style.display = "block";
            }
        }

        function handleEnter(e) {
            if (e.key === "Enter") sendMessage();
        }

        async function sendMessage() {
            const inputField = document.getElementById("user-input");
            const text = inputField.value.trim();
            if (!text) return;

            // 1. Add user message to UI and session array
            appendMessage("user", text);
            sessionMessages.push({ role: "user", content: text });
            inputField.value = "";

            // 2. Add loading indicator
            const chatBox = document.getElementById("chat-box");
            chatBox.innerHTML += `<div class="message bot" id="loading">Thinking...</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // 3. Send request to our secure Cloudflare Function
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        passkey: myPasskey,
                        messages: sessionMessages
                    })
                });

                document.getElementById("loading").remove();

                if (!response.ok) {
                    throw new Error(response.status === 401 ? "Unauthorized: Wrong Passkey!" : "API Error");
                }

                const data = await response.json();
                
                // DeepSeek response format (OpenAI compatible)
                const botReply = data.choices[0].message.content; 
                
                // 4. Update UI and session array
                appendMessage("bot", botReply);
                sessionMessages.push({ role: "assistant", content: botReply });

            } catch (error) {
                document.getElementById("loading")?.remove();
                appendMessage("bot", "Error: " + error.message);
                sessionMessages.pop(); // Remove the user message from history so they can retry
            }
        }

        function appendMessage(sender, text) {
            const chatBox = document.getElementById("chat-box");
            chatBox.innerHTML += `<div class="message ${sender}"><strong>${sender === 'user' ? 'You' : 'DeepSeek'}:</strong> <br> ${text}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
